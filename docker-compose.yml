version: '3.8'

services:
  mongo:
    image: mongo:4.4
    container_name: namaste_bali_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./db:/seed
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    networks:
      - namaste_network

  minio:
    image: minio/minio:RELEASE.2022-12-12T19-27-27Z
    container_name: namaste_bali_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - namaste_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: namaste_bali_panel_api
    volumes:
      - ./uploads:/app/uploads
      - ./db:/app/db
    env_file:
      - .env
    ports:
      - "8282:8080"
    restart: unless-stopped
    depends_on:
      - mongo
      - minio
    networks:
      - namaste_network

volumes:
  mongo_data:
    driver: local
  minio_data:
    driver: local

networks:
  namaste_network:
    driver: bridge
